<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHRIMPTECH - Simple Contact Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { background: #0066cc; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        .log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 5px; font-family: monospace; max-height: 300px; overflow-y: auto; white-space: pre-wrap; margin-top: 20px; }
        h1 { color: #0066cc; text-align: center; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 SHRIMPTECH Simple Contact Test</h1>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Họ và tên *</label>
                <input type="text" id="name" name="name" value="Trần Minh Hiếu" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" value="minhhieu.test@gmail.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Số điện thoại *</label>
                <input type="tel" id="phone" name="phone" value="0835749407" required>
            </div>
            
            <div class="form-group">
                <label for="company">Công ty</label>
                <input type="text" id="company" name="company" value="SHRIMPTECH Test Company">
            </div>
            
            <div class="form-group">
                <label for="farmType">Loại ao nuôi *</label>
                <select id="farmType" name="farmType" required>
                    <option value="">Chọn loại ao</option>
                    <option value="pond-small" selected>Ao tròn nổi (50-700m²)</option>
                    <option value="pond-medium">Ao lót bạt đáy (700–1.000m²)</option>
                    <option value="pond-large">Ao siêu thâm canh (1.000–3.000m²)</option>
                    <option value="research">Nghiên cứu/Học thuật</option>
                    <option value="other">Khác</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="subject">Chủ đề quan tâm *</label>
                <select id="subject" name="subject" required>
                    <option value="">Chọn chủ đề</option>
                    <option value="product-info" selected>Thông tin sản phẩm</option>
                    <option value="consultation">Tư vấn hệ thống</option>
                    <option value="technical">Tư vấn kỹ thuật</option>
                    <option value="installation">Lắp đặt & bảo trì</option>
                    <option value="partnership">Hợp tác đại lý</option>
                    <option value="research">Hợp tác nghiên cứu</option>
                    <option value="other">Khác</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Nội dung tin nhắn *</label>
                <textarea id="message" name="message" rows="4" required>Xin chào SHRIMPTECH team!

Tôi quan tâm đến hệ thống IoT thông minh cho nuôi tôm của công ty. Vui lòng tư vấn thêm về:
- Tính năng giám sát chất lượng nước
- Chi phí lắp đặt và vận hành
- Thời gian triển khai dự án

Cảm ơn!</textarea>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="newsletter" name="newsletter" checked>
                    Đăng ký nhận tin tức dự án
                </label>
            </div>
            
            <button type="submit">Gửi liên hệ</button>
        </form>
        
        <div id="status"></div>
        <div id="log" class="log">Sẵn sàng gửi form...\n</div>
    </div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
            setTimeout(() => statusDiv.innerHTML = '', 8000);
        }

        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang gửi...';
            
            try {
                // Collect form data
                const formData = new FormData(this);
                const data = {
                    name: formData.get('name'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    company: formData.get('company'),
                    farmType: formData.get('farmType'),
                    subject: formData.get('subject'),
                    message: formData.get('message'),
                    newsletter: formData.get('newsletter') === 'on'
                };

                log('📧 Preparing to send contact form...');
                log('Data: ' + JSON.stringify(data, null, 2));

                // Try different endpoints
                const endpoints = [
                    'http://localhost:3001/api/contact',
                    'http://127.0.0.1:3001/api/contact'
                ];

                let success = false;
                let lastError = null;

                for (const endpoint of endpoints) {
                    try {
                        log(`🌐 Trying endpoint: ${endpoint}`);
                        
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify(data),
                            mode: 'cors'
                        });

                        log(`📡 Response: ${response.status} ${response.statusText}`);

                        if (response.ok) {
                            const result = await response.json();
                            log(`✅ SUCCESS: ${result.message}`);
                            showStatus(`✅ ${result.message}`, 'success');
                            
                            // Reset form
                            this.reset();
                            success = true;
                            break;
                        } else {
                            const errorText = await response.text();
                            log(`❌ HTTP Error ${response.status}: ${errorText}`);
                            lastError = `HTTP ${response.status}: ${errorText}`;
                        }
                    } catch (error) {
                        log(`❌ Network Error: ${error.message}`);
                        lastError = error.message;
                    }
                }

                if (!success) {
                    throw new Error(lastError || 'Không thể kết nối đến server');
                }

            } catch (error) {
                log(`❌ FINAL ERROR: ${error.message}`);
                showStatus(`❌ Lỗi: ${error.message}. Vui lòng liên hệ trực tiếp: shrimptech.vhu.hutech@gmail.com`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Log system info
        log('🌐 User Agent: ' + navigator.userAgent);
        log('📍 Current URL: ' + window.location.href);
        log('🔗 Origin: ' + window.location.origin);
    </script>
</body>
</html>
